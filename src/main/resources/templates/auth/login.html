<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
 <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
 <title>Login – EV Charging</title>
 <link rel="stylesheet" th:href="@{/css/style.css}"/>
 <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
</head>
<body>
<th:block th:replace="~{fragments/layout :: uiScripts}"></th:block>
<div class="page-wrapper">
 <div style="max-width:420px;margin:2rem auto;">
  <div class="card">
   <div class="card-header">
    <span class="card-title">Login</span>
   </div>
   <form th:action="@{/ui/login}" method="post">
    <input th:if="${_csrf != null}" type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    <div th:if="${param.error}" class="alert alert-danger">Invalid username or password.</div>
    <div th:if="${param.logout}" class="alert alert-success">You have been logged out.</div>
    <div th:if="${successMsg}" class="alert alert-success" th:text="${successMsg}"></div>
    <div class="form-group">
     <label class="form-label" for="username">Username</label>
     <input id="username" name="username" type="text" class="form-control" autocomplete="username" required/>
    </div>
    <div class="form-group">
     <label class="form-label" for="password">Password</label>
     <input id="password" name="password" type="password" class="form-control" autocomplete="current-password" required/>
    </div>
    <div class="flex gap-1 mt-2">
      <button type="submit" class="btn btn-primary">Login</button>
      <a th:href="@{/ui/register}" class="btn btn-outline">Create Account</a>
      <a th:href="@{/ui/home}" class="btn btn-outline">Home</a>
    </div>
   </form>
  </div>
 </div>
</div>
<th:block th:replace="~{fragments/layout :: footer}"></th:block>
</body>
</html>
