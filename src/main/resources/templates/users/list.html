<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
 <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
 <title>Users - EV Charging</title>
 <link rel="stylesheet" th:href="@{/css/style.css}"/>
 <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
</head>
<body>
<th:block th:replace="~{fragments/layout :: navbar('users')}"></th:block>
<th:block th:replace="~{fragments/layout :: uiScripts}"></th:block>
<div class="page-wrapper">
 <div class="flex-between mb-2">
  <h1 class="page-title">Users <small th:text="${users.size()} + ' records'">0 records</small></h1>
 </div>

 <div class="card" th:if="${users.isEmpty()}">
  <p class="text-center text-muted" style="padding:2rem;">No users found.</p>
 </div>

 <div class="card" th:unless="${users.isEmpty()}">
  <div class="table-wrap">
   <table>
    <thead>
    <tr>
     <th>ID</th><th>Username</th><th>Role</th><th>Status</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="user : ${users}">
     <td th:text="${user.id}"></td>
     <td th:text="${user.username}"></td>
     <td><span class="badge badge-blue" th:text="${user.role}"></span></td>
     <td>
      <span class="badge" th:classappend="${user.enabled} ? ' badge-green' : ' badge-red'" th:text="${user.enabled} ? 'Enabled' : 'Disabled'"></span>
     </td>
    </tr>
    </tbody>
   </table>
  </div>
 </div>
</div>
<th:block th:replace="~{fragments/layout :: footer}"></th:block>
</body>
</html>
