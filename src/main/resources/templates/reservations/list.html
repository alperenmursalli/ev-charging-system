<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
 <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
 <title>Rezervasyonlar – EV Charging</title>
 <link rel="stylesheet" th:href="@{/css/style.css}"/>
 <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
</head>
<body>
<nav class="navbar">
 <a href="/ui/home" class="navbar-brand"> <span>EV</span>Charge</a>
 <div class="navbar-links">
 <a th:href="@{/ui/home}">Ana Sayfa</a>
 <a th:href="@{/ui/vehicles}">Araçlar</a>
 <a th:href="@{/ui/stations}">İstasyonlar</a>
 <a th:href="@{/ui/stations/map}"> Harita</a>
 <a th:href="@{/ui/reservations}" class="active">Rezervasyonlar</a>
 <a th:href="@{/ui/sessions/start}">Şarj Et</a>
 <button class="dark-toggle" onclick="toggleDark()" id="darkBtn" title="Dark / Light mode">
 <span id="darkIcon"></span>
 <span class="toggle-label" id="darkLabel">Dark</span>
 </button>
 </div>
</nav>
<script>
 (function(){
 var d = localStorage.getItem("evDark");
 if(d === "1") { document.body.classList.add("dark"); }
 })();
 function toggleDark() {
 var on = document.body.classList.toggle("dark");
 localStorage.setItem("evDark", on ? "1" : "0");
 document.getElementById("darkIcon").textContent = on ? "" : "";
 document.getElementById("darkLabel").textContent = on ? "Light" : "Dark";
 }
 window.addEventListener("DOMContentLoaded", function(){
 var on = document.body.classList.contains("dark");
 var btn = document.getElementById("darkBtn");
 if(btn){
 document.getElementById("darkIcon").textContent = on ? "" : "";
 document.getElementById("darkLabel").textContent = on ? "Light" : "Dark";
 }
 });
</script>
<div class="page-wrapper">
 <div class="flex-between mb-2">
 <h1 class="page-title"> Rezervasyonlar</h1>
 <a th:href="@{/ui/reservations/create}" class="btn btn-primary">+ Yeni Rezervasyon</a>
 </div>

 <div class="card" th:if="${reservations.isEmpty()}">
 <p class="text-center text-muted" style="padding:2rem;">Henüz rezervasyon yok. <a th:href="@{/ui/reservations/create}">Yeni oluştur →</a></p>
 </div>

 <div class="card" th:unless="${reservations.isEmpty()}">
 <div class="table-wrap">
 <table>
 <thead>
 <tr><th>ID</th><th>Araç</th><th>Charger</th><th>Başlangıç</th><th>Bitiş</th><th>Durum</th><th>İşlem</th></tr>
 </thead>
 <tbody>
 <tr th:each="r : ${reservations}">
 <td th:text="${r.id}"></td>
 <td>Araç #<span th:text="${r.vehicleId}"></span></td>
 <td>Charger #<span th:text="${r.chargerId}"></span></td>
 <td th:text="${#temporals.format(r.startTime, 'dd.MM HH:mm')}"></td>
 <td th:text="${#temporals.format(r.endTime, 'dd.MM HH:mm')}"></td>
 <td>
 <span class="badge"
 th:classappend="${r.status.name() == 'ACTIVE'} ? 'badge-blue' : (${r.status.name() == 'IN_PROGRESS'} ? 'badge-yellow' : (${r.status.name() == 'COMPLETED'} ? 'badge-green' : 'badge-red'))"
 th:text="${r.status}"></span>
 </td>
 <td>
 <a th:if="${r.status.name() == 'ACTIVE' or r.status.name() == 'IN_PROGRESS'}"
 th:href="@{/ui/sessions/start(reservationId=${r.id})}"
 class="btn btn-success btn-sm"> Şarj Et</a>
 </td>
 </tr>
 </tbody>
 </table>
 </div>
 </div>
</div>
<footer>EV Charging System &copy; 2026</footer>
</body>
</html>
