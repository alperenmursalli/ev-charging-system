<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
 <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
 <title th:text="${station.name} + ' – EV Charging'">İstasyon Detay</title>
 <link rel="stylesheet" th:href="@{/css/style.css}"/>
 <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
</head>
<body>
<nav class="navbar">
 <a href="/ui/home" class="navbar-brand"> <span>EV</span>Charge</a>
 <div class="navbar-links">
 <a th:href="@{/ui/home}">Ana Sayfa</a>
 <a th:href="@{/ui/vehicles}">Araçlar</a>
 <a th:href="@{/ui/stations}" class="active">İstasyonlar</a>
 <a th:href="@{/ui/stations/map}"> Harita</a>
 <a th:href="@{/ui/reservations}">Rezervasyonlar</a>
 <a th:href="@{/ui/sessions/start}">Şarj Et</a>
 <button class="dark-toggle" onclick="toggleDark()" id="darkBtn" title="Dark / Light mode">
 <span id="darkIcon"></span>
 <span class="toggle-label" id="darkLabel">Dark</span>
 </button>
 </div>
</nav>
<script>
 (function(){
 var d = localStorage.getItem("evDark");
 if(d === "1") { document.body.classList.add("dark"); }
 })();
 function toggleDark() {
 var on = document.body.classList.toggle("dark");
 localStorage.setItem("evDark", on ? "1" : "0");
 document.getElementById("darkIcon").textContent = on ? "" : "";
 document.getElementById("darkLabel").textContent = on ? "Light" : "Dark";
 }
 window.addEventListener("DOMContentLoaded", function(){
 var on = document.body.classList.contains("dark");
 var btn = document.getElementById("darkBtn");
 if(btn){
 document.getElementById("darkIcon").textContent = on ? "" : "";
 document.getElementById("darkLabel").textContent = on ? "Light" : "Dark";
 }
 });
</script>
<div class="page-wrapper">
 <div class="flex-between mb-2">
 <h1 class="page-title" th:text="${station.name}">İstasyon Adı</h1>
 <a th:href="@{/ui/stations}" class="btn btn-outline btn-sm">← Geri</a>
 </div>

 <!-- İstasyon Bilgileri -->
 <div class="card">
 <div class="card-header">
 <span class="card-title"> İstasyon Bilgileri</span>
 <span class="badge"
 th:classappend="${station.status.name() == 'AVAILABLE'} ? 'badge-green' : (${station.status.name() == 'OCCUPIED'} ? 'badge-yellow' : 'badge-red')"
 th:text="${station.status}"></span>
 </div>
 <div class="grid-2">
 <div>
 <p class="text-muted" style="font-size:0.82rem;margin-bottom:0.25rem;">ADRES</p>
 <p th:text="${station.address}"></p>
 </div>
 <div>
 <p class="text-muted" style="font-size:0.82rem;margin-bottom:0.25rem;">KOORDİNAT</p>
 <p><code th:text="${station.latitude} + ', ' + ${station.longitude}"></code></p>
 </div>
 </div>
 <div class="mt-2">
 <a th:href="@{'https://maps.google.com/?q=' + ${station.latitude} + ',' + ${station.longitude}}"
 target="_blank" class="btn btn-outline btn-sm"> Google Maps'te Aç</a>
 </div>
 </div>

 <!-- Chargerlar -->
 <div class="card">
 <div class="card-header">
 <span class="card-title"> Chargerlar <small th:text="'(' + ${chargers.size()} + ' adet)'"></small></span>
 <a th:href="@{/ui/reservations/create}" class="btn btn-primary btn-sm">+ Rezervasyon Yap</a>
 </div>

 <div th:if="${chargers.isEmpty()}">
 <p class="text-muted text-center" style="padding:1.5rem;">Bu istasyonda henüz charger yok.</p>
 </div>

 <div class="table-wrap" th:unless="${chargers.isEmpty()}">
 <table>
 <thead>
 <tr>
 <th>Kod</th><th>Tip</th><th>Güç</th><th>Konnektör</th><th>Fiyat/kWh</th><th>Durum</th><th>İşlem</th>
 </tr>
 </thead>
 <tbody>
 <tr th:each="charger : ${chargers}">
 <td><code th:text="${charger.chargerCode}"></code></td>
 <td><span class="badge badge-blue" th:text="${charger.chargerType}"></span></td>
 <td th:text="${charger.powerOutput}"></td>
 <td><span class="badge badge-gray" th:text="${charger.connectorType}"></span></td>
 <td>
 <strong th:text="${charger.pricePerKwh} + ' ₺'"></strong>
 </td>
 <td>
 <span class="badge"
 th:classappend="${charger.status.name() == 'AVAILABLE'} ? 'badge-green' : (${charger.status.name() == 'OCCUPIED'} ? 'badge-yellow' : 'badge-red')"
 th:text="${charger.status}">
 </span>
 </td>
 <td>
 <a th:if="${charger.status.name() == 'AVAILABLE'}"
 th:href="@{/ui/reservations/create(chargerId=${charger.id})}"
 class="btn btn-primary btn-sm">Rezerve Et</a>
 <span th:unless="${charger.status.name() == 'AVAILABLE'}" class="text-muted" style="font-size:0.82rem;">Müsait Değil</span>
 </td>
 </tr>
 </tbody>
 </table>
 </div>
 </div>

</div>
<footer>EV Charging System &copy; 2026</footer>
</body>
</html>
