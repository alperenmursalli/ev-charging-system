<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
 <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
 <title th:text="#{page.vehicles.title} + ' – EV Charging'">Vehicles – EV Charging</title>
 <link rel="stylesheet" th:href="@{/css/style.css}"/>
 <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
</head>
<body>
<th:block th:replace="~{fragments/layout :: navbar('vehicles')}"></th:block>
<th:block th:replace="~{fragments/layout :: uiScripts}"></th:block>
<div class="page-wrapper">
 <div class="flex-between mb-2">
 <h1 class="page-title"><span th:text="#{page.vehicles.title}">Vehicles</span> <small th:text="#{vehicles.count(${vehicles.size()})}">0 records</small></h1>
 <a th:href="@{/ui/vehicles/add}" class="btn btn-primary" th:text="#{vehicles.add.button}">+ Add Vehicle</a>
 </div>

 <div th:if="${successMsg}" class="alert alert-success" th:text="${successMsg}"></div>

 <div class="card" th:if="${vehicles.isEmpty()}">
 <p class="text-center text-muted" style="padding:2rem;"><span th:text="#{vehicles.empty}">No vehicles added yet.</span> <a th:href="@{/ui/vehicles/add}" th:text="#{vehicles.empty.cta}">Add the first vehicle →</a></p>
 </div>

 <div class="card" th:unless="${vehicles.isEmpty()}">
 <div class="table-wrap">
 <table>
 <thead>
 <tr>
 <th>ID</th><th th:text="#{vehicles.brand}">Brand</th><th th:text="#{vehicles.model}">Model</th><th th:text="#{vehicles.battery}">Battery</th><th th:text="#{vehicles.connector}">Connector</th><th th:text="#{vehicles.plate}">Plate</th><th th:text="#{common.action}">Action</th>
 </tr>
 </thead>
 <tbody>
 <tr th:each="v : ${vehicles}">
 <td th:text="${v.id}"></td>
 <td th:text="${v.brand}"></td>
 <td th:text="${v.model}"></td>
 <td th:text="${v.batteryCapacity} + ' kWh'"></td>
 <td><span class="badge badge-blue" th:text="${v.connectorType}"></span></td>
 <td><code th:text="${v.plateNumber}"></code></td>
 <td>
 <a th:href="@{/ui/reservations/create(vehicleId=${v.id})}" class="btn btn-outline btn-sm" th:text="#{nav.reservations}">Reservation</a>
 </td>
 </tr>
 </tbody>
 </table>
 </div>
 </div>
</div>
<th:block th:replace="~{fragments/layout :: footer}"></th:block>
</body>
</html>
