<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
 <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
 <title>Şarj Başlat – EV Charging</title>
 <link rel="stylesheet" th:href="@{/css/style.css}"/>
 <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
</head>
<body>
<nav class="navbar">
 <a href="/ui/home" class="navbar-brand"> <span>EV</span>Charge</a>
 <div class="navbar-links">
 <a th:href="@{/ui/home}">Ana Sayfa</a>
 <a th:href="@{/ui/vehicles}">Araçlar</a>
 <a th:href="@{/ui/stations}">İstasyonlar</a>
 <a th:href="@{/ui/stations/map}"> Harita</a>
 <a th:href="@{/ui/reservations}">Rezervasyonlar</a>
 <a th:href="@{/ui/sessions/start}" class="active">Şarj Et</a>
 <button class="dark-toggle" onclick="toggleDark()" id="darkBtn" title="Dark / Light mode">
 <span id="darkIcon"></span>
 <span class="toggle-label" id="darkLabel">Dark</span>
 </button>
 </div>
</nav>
<script>
 (function(){
 var d = localStorage.getItem("evDark");
 if(d === "1") { document.body.classList.add("dark"); }
 })();
 function toggleDark() {
 var on = document.body.classList.toggle("dark");
 localStorage.setItem("evDark", on ? "1" : "0");
 document.getElementById("darkIcon").textContent = on ? "" : "";
 document.getElementById("darkLabel").textContent = on ? "Light" : "Dark";
 }
 window.addEventListener("DOMContentLoaded", function(){
 var on = document.body.classList.contains("dark");
 var btn = document.getElementById("darkBtn");
 if(btn){
 document.getElementById("darkIcon").textContent = on ? "" : "";
 document.getElementById("darkLabel").textContent = on ? "Light" : "Dark";
 }
 });
</script>
<div class="page-wrapper">
 <div style="max-width:520px;margin:0 auto;">
 <div class="flex-between mb-2">
 <h1 class="page-title"> Şarj Başlat</h1>
 <a th:href="@{/ui/reservations}" class="btn btn-outline btn-sm">← Geri</a>
 </div>

 <div th:if="${errorMsg}" class="alert alert-danger" th:text="${errorMsg}"></div>

 <div class="card">
 <form th:action="@{/ui/sessions/start}" method="post">

 <div class="form-group">
 <label class="form-label">Rezervasyon *</label>
 <select name="reservationId" class="form-control" required>
 <option value="">Rezervasyon seçin...</option>
 <option th:each="r : ${reservations}"
 th:value="${r.id}"
 th:selected="${r.id == selectedReservationId}"
 th:if="${r.status.name() == 'ACTIVE' or r.status.name() == 'IN_PROGRESS'}"
 th:text="'Rezervasyon #' + ${r.id} + ' – Araç #' + ${r.vehicleId} + ' – Charger #' + ${r.chargerId} + ' (' + ${r.status} + ')'"></option>
 </select>
 <div class="form-hint">Yalnızca ACTIVE veya IN_PROGRESS rezervasyonlar gösterilir</div>
 </div>

 <div class="form-group">
 <label class="form-label">Başlangıç Batarya Seviyesi (%)</label>
 <input type="number" name="startBatteryLevel" class="form-control"
 placeholder="Boş bırakırsanız son bilinen değer kullanılır"
 min="0" max="100" step="0.1"/>
 <div class="form-hint">0-100 arası bir değer girin veya boş bırakın (otomatik algılanır)</div>
 </div>

 <div class="flex gap-1 mt-2">
 <button type="submit" class="btn btn-success"> Şarjı Başlat</button>
 <a th:href="@{/ui/reservations/create}" class="btn btn-outline">Önce Rezervasyon Yap</a>
 </div>
 </form>
 </div>
 </div>
</div>
<footer>EV Charging System &copy; 2026</footer>
</body>
</html>
