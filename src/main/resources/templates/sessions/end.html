<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
 <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
 <title th:text="#{sessions.end.title} + ' – EV Charging'">Finish Charging – EV Charging</title>
 <link rel="stylesheet" th:href="@{/css/style.css}"/>
 <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
</head>
<body>
<th:block th:replace="~{fragments/layout :: navbar('sessions')}"></th:block>
<th:block th:replace="~{fragments/layout :: uiScripts}"></th:block>
<div class="page-wrapper">
 <div style="max-width:520px;margin:0 auto;">
 <div class="flex-between mb-2">
 <h1 class="page-title" th:text="#{sessions.end.title}">Finish Charging</h1>
 </div>

 <div th:if="${errorMsg}" class="alert alert-danger" th:text="${errorMsg}"></div>

 <!-- Aktif session özeti -->
 <div class="card" th:if="${chargingSession}">
 <div class="card-header">
 <span class="card-title" th:text="#{sessions.activeSession}">Active Session</span>
 <span class="badge badge-yellow" th:text="#{sessions.active}">Active</span>
 </div>
 <div class="grid-2" style="font-size:0.9rem;">
 <div>
 <p class="text-muted" style="font-size:0.78rem;" th:text="#{sessions.id.upper}">SESSION ID</p>
 <p><strong>#<span th:text="${chargingSession.id}"></span></strong></p>
 </div>
 <div>
 <p class="text-muted" style="font-size:0.78rem;" th:text="#{sessions.startBattery.upper}">START BATTERY</p>
 <p><strong th:text="${chargingSession.startBatteryLevel} + '%'"></strong></p>
 </div>
 <div>
 <p class="text-muted" style="font-size:0.78rem;" th:text="#{reservations.start.upper}">START</p>
 <p th:text="${#temporals.format(chargingSession.startedAt, 'HH:mm:ss')}"></p>
 </div>
 <div>
 <p class="text-muted" style="font-size:0.78rem;" th:text="#{reservations.charger.upper}">CHARGING UNIT</p>
 <p>#<span th:text="${chargingSession.chargerId}"></span></p>
 </div>
 </div>

 <div style="margin-top:1rem;">
 <p class="text-muted" style="font-size:0.78rem;margin-bottom:0.3rem;" th:text="#{sessions.currentBatteryEstimate.upper}">CURRENT BATTERY (estimate)</p>
 <div class="battery-bar">
 <div class="battery-fill" th:style="'width:' + ${chargingSession.startBatteryLevel} + '%'"></div>
 </div>
 <p style="font-size:0.82rem;" th:text="#{sessions.startBatteryValue(${chargingSession.startBatteryLevel})}"></p>
 </div>
 </div>

 <!-- Bitiş formu -->
 <div class="card">
 <form th:action="@{/ui/sessions/{id}/end(id=${chargingSession.id})}" method="post" th:attr="data-confirm-msg=#{confirm.finishCharging}">
 <input th:if="${_csrf != null}" type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
 <div class="form-group">
 <label class="form-label" th:text="#{sessions.end.batteryLevel}">End Battery Level (%) *</label>
 <input type="number" name="endBatteryLevel" class="form-control" required
 th:min="${chargingSession.startBatteryLevel}" max="100" step="0.1"
 th:placeholder="#{sessions.end.batteryPlaceholder}"/>
 <div class="form-hint">
 <span th:text="#{sessions.end.mustBeAbovePrefix}">Must be above start level</span>
 (<span th:text="${chargingSession.startBatteryLevel}"></span>%)
 </div>
 </div>

 <div class="flex gap-1 mt-2">
 <button type="submit" class="btn btn-danger" th:text="#{sessions.end.button}">Finish Charging and Calculate Cost</button>
 </div>
 </form>
 </div>
 </div>
</div>
<th:block th:replace="~{fragments/layout :: footer}"></th:block>
</body>
</html>
