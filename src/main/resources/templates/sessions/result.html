<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
 <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
 <title th:text="#{sessions.result.title} + ' – EV Charging'">Charging Result – EV Charging</title>
 <link rel="stylesheet" th:href="@{/css/style.css}"/>
 <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
</head>
<body>
<th:block th:replace="~{fragments/layout :: navbar('sessions')}"></th:block>
<th:block th:replace="~{fragments/layout :: uiScripts}"></th:block>
<div class="page-wrapper">
 <div style="max-width:580px;margin:0 auto;">
 <h1 class="page-title" th:text="#{sessions.result.title}">Charging Completed</h1>

 <div th:if="${session}">
 <!-- Maliyet Özeti -->
 <div class="cost-summary">
 <div class="cost-label">TOPLAM MALİYET</div>
 <div class="cost-big">₺<span th:text="${session.totalCost}"></span></div>
 <div class="cost-meta">
 <div class="cost-meta-item">
 <div class="val" th:text="${session.consumedKwh} + ' kWh'"></div>
 <div class="lbl">Tüketilen Enerji</div>
 </div>
 <div class="cost-meta-item">
 <div class="val">₺<span th:text="${session.totalCost != null and session.consumedKwh != null and session.consumedKwh > 0 ? #numbers.formatDecimal(session.totalCost / session.consumedKwh, 1, 2) : '–'}"></span>/kWh</div>
 <div class="lbl">Birim Fiyat</div>
 </div>
 <div class="cost-meta-item" th:if="${session.chargedPercentage != null}">
 <div class="val" th:text="'+' + ${session.chargedPercentage} + '%'"></div>
 <div class="lbl">Batarya Artışı</div>
 </div>
 </div>
 </div>

 <!-- Detay Tablosu -->
 <div class="card">
 <div class="card-header">
 <span class="card-title"> Oturum Detayları</span>
 <span class="badge badge-green" th:text="${session.status}"></span>
 </div>

 <!-- Batarya görseli -->
 <div style="margin-bottom:1rem;">
 <div class="flex-between" style="font-size:0.82rem;margin-bottom:0.3rem;">
 <span class="text-muted">Batarya</span>
 <span th:text="${session.startBatteryLevel} + '% → ' + ${session.endBatteryLevel} + '%'"></span>
 </div>
 <div class="battery-bar" style="height:18px;">
 <div class="battery-fill" th:style="'width:' + ${session.endBatteryLevel} + '%'"></div>
 </div>
 </div>

 <table style="width:100%;font-size:0.9rem;">
 <tr>
 <td class="text-muted" style="padding:0.35rem 0;width:50%;">Oturum ID</td>
 <td><strong>#<span th:text="${session.id}"></span></strong></td>
 </tr>
 <tr>
 <td class="text-muted" style="padding:0.35rem 0;">Rezervasyon</td>
 <td>#<span th:text="${session.reservationId}"></span></td>
 </tr>
 <tr>
 <td class="text-muted" style="padding:0.35rem 0;">Başlangıç</td>
 <td th:text="${#temporals.format(session.startedAt, 'dd.MM.yyyy HH:mm:ss')}"></td>
 </tr>
 <tr>
 <td class="text-muted" style="padding:0.35rem 0;">Bitiş</td>
 <td th:text="${#temporals.format(session.endedAt, 'dd.MM.yyyy HH:mm:ss')}"></td>
 </tr>
 <tr>
 <td class="text-muted" style="padding:0.35rem 0;">Başlangıç Batarya</td>
 <td th:text="${session.startBatteryLevel} + '%'"></td>
 </tr>
 <tr>
 <td class="text-muted" style="padding:0.35rem 0;">Bitiş Batarya</td>
 <td th:text="${session.endBatteryLevel} + '%'"></td>
 </tr>
 <tr>
 <td class="text-muted" style="padding:0.35rem 0;">Tüketilen kWh</td>
 <td><strong th:text="${session.consumedKwh} + ' kWh'"></strong></td>
 </tr>
 <tr>
 <td class="text-muted" style="padding:0.35rem 0;">Toplam Maliyet</td>
 <td><strong style="color:#1d4ed8;" th:text="'₺' + ${session.totalCost}"></strong></td>
 </tr>
 </table>
 </div>

 <div class="flex gap-1">
 <a th:href="@{/ui/home}" class="btn btn-primary" th:text="#{nav.home}">Home</a>
 <a th:href="@{/ui/reservations/create}" class="btn btn-outline" th:text="#{common.new} + ' ' + #{nav.reservations}">+ New Reservation</a>
 </div>
 </div>
 </div>
</div>
<th:block th:replace="~{fragments/layout :: footer}"></th:block>
</body>
</html>
