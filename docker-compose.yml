services:
  evsystem:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: evsystem
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${APP_PORT:-8081}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-update}
      SERVER_FORWARD_HEADERS_STRATEGY: framework
      TZ: Europe/Istanbul
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    cpus: "2.0"
    mem_limit: 1g
    mem_reservation: 512m
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
