<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
 <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
 <title th:text="#{sessions.start.title} + ' – EV Charging'">Start Charging – EV Charging</title>
 <link rel="stylesheet" th:href="@{/css/style.css}"/>
 <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
</head>
<body>
<th:block th:replace="~{fragments/layout :: navbar('sessions')}"></th:block>
<th:block th:replace="~{fragments/layout :: uiScripts}"></th:block>
<div class="page-wrapper">
 <div style="max-width:520px;margin:0 auto;">
 <div class="flex-between mb-2">
 <h1 class="page-title" th:text="#{sessions.start.title}">Start Charging</h1>
 <a th:href="@{/ui/reservations}" class="btn btn-outline btn-sm" th:text="#{common.back}">← Back</a>
 </div>

 <div th:if="${errorMsg}" class="alert alert-danger" th:text="${errorMsg}"></div>

 <div class="card">
 <form th:action="@{/ui/sessions/start}" method="post" th:attr="data-confirm-msg=#{confirm.startCharging}">
 <input th:if="${_csrf != null}" type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

 <div class="form-group">
 <label class="form-label" th:text="#{nav.reservations} + ' *'">Reservation *</label>
 <select name="reservationId" class="form-control" required>
 <option value="" th:text="#{sessions.start.selectReservation}">Select reservation...</option>
 <option th:each="r : ${reservations}"
 th:value="${r.id}"
 th:selected="${r.id == selectedReservationId}"
 th:if="${r.status.name() == 'ACTIVE' or r.status.name() == 'IN_PROGRESS'}"
 th:text="#{reservations.session.option(${r.id}, ${r.vehicleId}, ${r.chargerId}, ${r.status})}"></option>
 </select>
 <div class="form-hint" th:text="#{sessions.start.activeHint}">Only ACTIVE or IN_PROGRESS reservations are shown</div>
 </div>

 <div class="form-group">
 <label class="form-label" th:text="#{sessions.start.batteryLevel}">Start Battery Level (%)</label>
 <input type="number" name="startBatteryLevel" class="form-control"
 th:placeholder="#{sessions.start.batteryPlaceholder}"
 min="0" max="100" step="0.1"/>
 <div class="form-hint" th:text="#{sessions.start.batteryHint}">Enter a value from 0 to 100 or leave it blank</div>
 </div>

 <div class="flex gap-1 mt-2">
 <button type="submit" class="btn btn-success" th:text="#{sessions.start.button}">Start Charging</button>
 <a th:href="@{/ui/reservations/create}" class="btn btn-outline" th:text="#{sessions.start.makeReservationFirst}">Create Reservation First</a>
 </div>
 </form>
 </div>
 </div>
</div>
<th:block th:replace="~{fragments/layout :: footer}"></th:block>
</body>
</html>
