<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
 <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
 <title>Araç Ekle – EV Charging</title>
 <link rel="stylesheet" th:href="@{/css/style.css}"/>
 <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
</head>
<body>
<nav class="navbar">
 <a href="/ui/home" class="navbar-brand"> <span>EV</span>Charge</a>
 <div class="navbar-links">
 <a th:href="@{/ui/home}">Ana Sayfa</a>
 <a th:href="@{/ui/vehicles}" class="active">Araçlar</a>
 <a th:href="@{/ui/stations}">İstasyonlar</a>
 <a th:href="@{/ui/stations/map}"> Harita</a>
 <a th:href="@{/ui/reservations}">Rezervasyonlar</a>
 <a th:href="@{/ui/sessions/start}">Şarj Et</a>
 <button class="dark-toggle" onclick="toggleDark()" id="darkBtn" title="Dark / Light mode">
 <span id="darkIcon"></span>
 <span class="toggle-label" id="darkLabel">Dark</span>
 </button>
 </div>
</nav>
<script>
 (function(){
 var d = localStorage.getItem("evDark");
 if(d === "1") { document.body.classList.add("dark"); }
 })();
 function toggleDark() {
 var on = document.body.classList.toggle("dark");
 localStorage.setItem("evDark", on ? "1" : "0");
 document.getElementById("darkIcon").textContent = on ? "" : "";
 document.getElementById("darkLabel").textContent = on ? "Light" : "Dark";
 }
 window.addEventListener("DOMContentLoaded", function(){
 var on = document.body.classList.contains("dark");
 var btn = document.getElementById("darkBtn");
 if(btn){
 document.getElementById("darkIcon").textContent = on ? "" : "";
 document.getElementById("darkLabel").textContent = on ? "Light" : "Dark";
 }
 });
</script>
<div class="page-wrapper">
 <div style="max-width:560px;margin:0 auto;">
 <div class="flex-between mb-2">
 <h1 class="page-title"> Araç Ekle</h1>
 <a th:href="@{/ui/vehicles}" class="btn btn-outline btn-sm">← Geri</a>
 </div>

 <div th:if="${errorMsg}" class="alert alert-danger" th:text="${errorMsg}"></div>

 <div class="card">
 <form th:action="@{/ui/vehicles/add}" method="post" th:object="${vehicle}">

 <div class="grid-2">
 <div class="form-group">
 <label class="form-label">Marka *</label>
 <input type="text" class="form-control" th:field="*{brand}" placeholder="Tesla, BMW, Audi..."/>
 <div class="error-msg" th:if="${#fields.hasErrors('brand')}" th:errors="*{brand}"></div>
 </div>
 <div class="form-group">
 <label class="form-label">Model *</label>
 <input type="text" class="form-control" th:field="*{model}" placeholder="Model 3, i3, e-tron..."/>
 <div class="error-msg" th:if="${#fields.hasErrors('model')}" th:errors="*{model}"></div>
 </div>
 </div>

 <div class="form-group">
 <label class="form-label">Batarya Kapasitesi (kWh) *</label>
 <input type="number" class="form-control" th:field="*{batteryCapacity}" placeholder="75" step="0.1" min="1"/>
 <div class="form-hint">Aracınızın toplam batarya kapasitesi</div>
 <div class="error-msg" th:if="${#fields.hasErrors('batteryCapacity')}" th:errors="*{batteryCapacity}"></div>
 </div>

 <div class="form-group">
 <label class="form-label">Konnektör Tipi *</label>
 <select class="form-control" th:field="*{connectorType}">
 <option value="">Seçiniz...</option>
 <option th:each="ct : ${connectorTypes}" th:value="${ct}" th:text="${ct}"></option>
 </select>
 <div class="form-hint">CCS (DC hızlı şarj), TYPE2 (AC), CHADEMO (DC Japon standardı)</div>
 <div class="error-msg" th:if="${#fields.hasErrors('connectorType')}" th:errors="*{connectorType}"></div>
 </div>

 <div class="form-group">
 <label class="form-label">Plaka Numarası *</label>
 <input type="text" class="form-control" th:field="*{plateNumber}" placeholder="34ABC123" style="text-transform:uppercase;"/>
 <div class="form-hint">Benzersiz plaka numarası (büyük harf)</div>
 <div class="error-msg" th:if="${#fields.hasErrors('plateNumber')}" th:errors="*{plateNumber}"></div>
 </div>

 <div class="flex gap-1 mt-2">
 <button type="submit" class="btn btn-primary"> Araç Ekle</button>
 <a th:href="@{/ui/vehicles}" class="btn btn-outline">İptal</a>
 </div>
 </form>
 </div>
 </div>
</div>
<footer>EV Charging System &copy; 2026</footer>
</body>
</html>
