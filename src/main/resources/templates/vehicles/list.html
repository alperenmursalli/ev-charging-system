<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
 <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
 <title>Araçlar – EV Charging</title>
 <link rel="stylesheet" th:href="@{/css/style.css}"/>
 <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
</head>
<body>
<nav class="navbar">
 <a href="/ui/home" class="navbar-brand"> <span>EV</span>Charge</a>
 <div class="navbar-links">
 <a th:href="@{/ui/home}">Ana Sayfa</a>
 <a th:href="@{/ui/vehicles}" class="active">Araçlar</a>
 <a th:href="@{/ui/stations}">İstasyonlar</a>
 <a th:href="@{/ui/stations/map}"> Harita</a>
 <a th:href="@{/ui/reservations}">Rezervasyonlar</a>
 <a th:href="@{/ui/sessions/start}">Şarj Et</a>
 <button class="dark-toggle" onclick="toggleDark()" id="darkBtn" title="Dark / Light mode">
 <span id="darkIcon"></span>
 <span class="toggle-label" id="darkLabel">Dark</span>
 </button>
 </div>
</nav>
<script>
 (function(){
 var d = localStorage.getItem("evDark");
 if(d === "1") { document.body.classList.add("dark"); }
 })();
 function toggleDark() {
 var on = document.body.classList.toggle("dark");
 localStorage.setItem("evDark", on ? "1" : "0");
 document.getElementById("darkIcon").textContent = on ? "" : "";
 document.getElementById("darkLabel").textContent = on ? "Light" : "Dark";
 }
 window.addEventListener("DOMContentLoaded", function(){
 var on = document.body.classList.contains("dark");
 var btn = document.getElementById("darkBtn");
 if(btn){
 document.getElementById("darkIcon").textContent = on ? "" : "";
 document.getElementById("darkLabel").textContent = on ? "Light" : "Dark";
 }
 });
</script>
<div class="page-wrapper">
 <div class="flex-between mb-2">
 <h1 class="page-title"> Araçlar <small th:text="${vehicles.size()} + ' kayıt'"></small></h1>
 <a th:href="@{/ui/vehicles/add}" class="btn btn-primary">+ Araç Ekle</a>
 </div>

 <div th:if="${successMsg}" class="alert alert-success" th:text="${successMsg}"></div>

 <div class="card" th:if="${vehicles.isEmpty()}">
 <p class="text-center text-muted" style="padding:2rem;">Henüz araç eklenmemiş. <a th:href="@{/ui/vehicles/add}">İlk aracı ekle →</a></p>
 </div>

 <div class="card" th:unless="${vehicles.isEmpty()}">
 <div class="table-wrap">
 <table>
 <thead>
 <tr>
 <th>ID</th><th>Marka</th><th>Model</th><th>Batarya</th><th>Konnektör</th><th>Plaka</th><th>İşlem</th>
 </tr>
 </thead>
 <tbody>
 <tr th:each="v : ${vehicles}">
 <td th:text="${v.id}"></td>
 <td th:text="${v.brand}"></td>
 <td th:text="${v.model}"></td>
 <td th:text="${v.batteryCapacity} + ' kWh'"></td>
 <td><span class="badge badge-blue" th:text="${v.connectorType}"></span></td>
 <td><code th:text="${v.plateNumber}"></code></td>
 <td>
 <a th:href="@{/ui/reservations/create(vehicleId=${v.id})}" class="btn btn-outline btn-sm">Rezervasyon</a>
 </td>
 </tr>
 </tbody>
 </table>
 </div>
 </div>
</div>
<footer>EV Charging System &copy; 2026</footer>
</body>
</html>
