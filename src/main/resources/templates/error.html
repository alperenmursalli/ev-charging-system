<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
 <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
 <title th:text="#{error.title} + ' – EV Charging'">Error – EV Charging</title>
 <link rel="stylesheet" th:href="@{/css/style.css}"/>
 <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
</head>
<body>
<th:block th:replace="~{fragments/layout :: navbar('')}"></th:block>
<th:block th:replace="~{fragments/layout :: uiScripts}"></th:block>
<div class="page-wrapper">
 <div style="max-width:480px;margin:3rem auto;text-align:center;">
 <div style="font-size:4rem;"></div>
 <h1 style="margin:1rem 0 0.5rem;" th:text="#{error.heading}">An Error Occurred</h1>
 <div class="alert alert-danger" th:if="${errorMsg}" th:text="${errorMsg}" style="text-align:left;"></div>
 <div class="alert alert-danger" th:unless="${errorMsg}" th:text="#{error.unexpected}">An unexpected error occurred.</div>
 <div class="flex gap-1" style="justify-content:center;margin-top:1.5rem;">
 <a th:href="@{/ui/home}" class="btn btn-primary" th:text="#{nav.home}">Home</a>
 <button onclick="history.back()" class="btn btn-outline" th:text="#{common.back}">← Back</button>
 </div>
 </div>
</div>
<th:block th:replace="~{fragments/layout :: footer}"></th:block>
</body>
</html>
