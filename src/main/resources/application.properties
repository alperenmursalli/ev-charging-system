spring.application.name=ev-charging-system

management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
google.maps.api-key=${GOOGLE_MAPS_API_KEY}
app.security.seed-admin-username=${APP_SECURITY_SEED_ADMIN_USERNAME}
app.security.seed-admin-password=${APP_SECURITY_SEED_ADMIN_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.datasource.hikari.maximum-pool-size=1
spring.datasource.hikari.minimum-idle=0

spring.thymeleaf.cache=false

charging.session.auto-end-delay-ms=60000
charging.session.auto-start-delay-ms=30000
charging.session.auto-start-battery-level=20
reservation.auto-expire-delay-ms=30000
reservation.auto-delete-delay-ms=3600000
reservation.auto-delete-retention-hours=24
