<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>Payment – EV Charging</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
</head>
<body>
<th:block th:replace="~{fragments/layout :: navbar('sessions')}"></th:block>
<th:block th:replace="~{fragments/layout :: uiScripts}"></th:block>
<div class="page-wrapper">
    <div style="max-width:580px;margin:0 auto;">
        <h1 class="page-title">Payment</h1>
        <div class="card">
            <div class="card-header">
                <span class="card-title">Session #<span th:text="${chargingSession.id}"></span></span>
                <span class="badge badge-blue" th:text="${chargingSession.status}"></span>
            </div>
            <p class="text-muted" style="margin-bottom:0.75rem;">Total amount: <strong th:text="${'₺' + chargingSession.totalCost}"></strong></p>
            <div class="alert alert-warning">
                This feature is not implemented yet.
            </div>
            <div class="mt-2">
                <a th:href="@{/ui/sessions/{id}/result(id=${chargingSession.id})}" class="btn btn-outline">Back to Session Summary</a>
            </div>
        </div>
    </div>
</div>
<th:block th:replace="~{fragments/layout :: footer}"></th:block>
</body>
</html>
